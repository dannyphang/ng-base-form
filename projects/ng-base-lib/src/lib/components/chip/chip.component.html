<p-chip
  [removable]="removable"
  [class]="styleClass + ' tw-flex tw-text-ellipsis tw-overflow-hidden chip-box'"
  (onRemove)="onRemove()"
  (click)="downloadable ? previewFileClick() : null"
>
  <div [class]="labelStyleClass + ' chip-label'">{{ label }}</div>
  <ng-template #removeicon>
    <i [class]="removeIconName + ' ' + removeIconStyleClass"></i>
  </ng-template>
</p-chip>
