<div class="toast-container top-right">
  <div
    *ngFor="let toast of toastList; trackBy: trackByKey"
    [ngClass]="{
      'toast-item': true,
      'toast-severity--success': toast.severity === 'success',
      'toast-severity--error': toast.severity === 'error',
      'toast-severity--info': toast.severity === 'info',
      'toast-severity--warn': toast.severity === 'warn',
      'toast-enter': !hasEntered(toast.key) && !isClosing(toast.key),
      'toast-enter-active': hasEntered(toast.key) && !isClosing(toast.key),
      'toast-leave-active': isClosing(toast.key),
    }"
  >
    <span [class]="toast.icon"></span>
    <div class="toast-message">{{ toast.message }}</div>
    <i class="pi pi-times toast-close" (click)="removeToast(toast.key)"></i>
  </div>
</div>
